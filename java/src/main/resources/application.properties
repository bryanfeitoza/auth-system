# Server
server.port=${JAVA_PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_system}
spring.datasource.username=${DB_USER:auth_user}
spring.datasource.password=${DB_PASS:auth_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:seu-segredo-jwt-super-seguro-aqui-mude-em-producao}
jwt.expiration=${JWT_EXPIRES_IN:604800}
