<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuthSystem — for Bryan Feitoza portifolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-shield-lock-fill me-2"></i>AuthSystem <small class="text-muted fw-normal fs-6">for Bryan Feitoza portifolio</small>
      </a>
      <div id="navButtons" class="d-none">
        <button class="btn btn-outline-light btn-sm me-2" onclick="showView('dashboard')">
          <i class="bi bi-speedometer2"></i> Dashboard
        </button>
        <button class="btn btn-outline-light btn-sm me-2" onclick="showView('profile')">
          <i class="bi bi-person-circle"></i> Perfil
        </button>
        <button class="btn btn-danger btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Sair
        </button>
      </div>
      <div id="guestButtons">
        <button class="btn btn-outline-light btn-sm me-2" onclick="showView('login')">Entrar</button>
        <button class="btn btn-primary btn-sm" onclick="showView('register')">Cadastrar</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="bg-glow"></div>
    <div id="loadingScreen" class="text-center py-5">
      <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem"></div>
      <p class="mt-3 text-muted">Carregando...</p>
    </div>

    <div id="viewContainer"></div>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">
        <i class="bi bi-heart-fill text-danger me-1"></i>
        <strong>AuthSystem</strong> — for Bryan Feitoza portifolio
      </p>
      <small class="text-muted">
        <i class="bi bi-code-slash me-1"></i>Node.js · Python · Java
      </small>
    </div>
  </footer>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
