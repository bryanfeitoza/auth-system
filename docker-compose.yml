# ──────────────────────────────────────────────
# AuthSystem — Docker Compose (todos os serviços)
# Uso: docker compose up -d
# ──────────────────────────────────────────────

services:
  # ─── Banco de Dados ───
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${DB_PASS:-auth_password}
      POSTGRES_DB: ${DB_NAME:-auth_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - auth_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Node.js ───
  node:
    build: ./node
    container_name: auth_node
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-auth_user}
      DB_PASS: ${DB_PASS:-auth_password}
      DB_NAME: ${DB_NAME:-auth_system}
      JWT_SECRET: ${JWT_SECRET:-seu-segredo-jwt}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth_network

  # ─── Python ───
  python:
    build: ./python
    container_name: auth_python
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-auth_user}
      DB_PASS: ${DB_PASS:-auth_password}
      DB_NAME: ${DB_NAME:-auth_system}
      JWT_SECRET: ${JWT_SECRET:-seu-segredo-jwt}
      PYTHON_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth_network

  # ─── Java ───
  java:
    build: ./java
    container_name: auth_java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-auth_user}
      DB_PASS: ${DB_PASS:-auth_password}
      DB_NAME: ${DB_NAME:-auth_system}
      JWT_SECRET: ${JWT_SECRET:-seu-segredo-jwt}
      JAVA_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth_network

  # ─── Nginx ───
  nginx:
    image: nginx:alpine
    container_name: auth_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node
      - python
      - java
    networks:
      - auth_network

  # ─── pgAdmin ───
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auth_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS:-admin}
    depends_on:
      - postgres
    networks:
      - auth_network

networks:
  auth_network:
    driver: bridge

volumes:
  postgres_data:
