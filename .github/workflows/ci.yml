name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: auth_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node/package-lock.json

      - run: npm ci
      - run: npm test -- --forceExit
        env:
          DB_HOST: localhost
          DB_USER: auth_user
          DB_PASS: auth_password
          DB_NAME: auth_system
          JWT_SECRET: test-secret
          NODE_PORT: 3000

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: auth_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pytest httpx
      - run: pytest -v
        env:
          DB_HOST: localhost
          DB_USER: auth_user
          DB_PASS: auth_password
          DB_NAME: auth_system
          JWT_SECRET: test-secret

  java:
    name: Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: auth_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - run: mvn test -B
        env:
          DB_HOST: localhost
          DB_USER: auth_user
          DB_PASS: auth_password
          DB_NAME: auth_system
          JWT_SECRET: test-secret
